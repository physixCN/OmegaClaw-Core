id = "omegaclaw.health.glucose"
kind = "body-app"
version = "0.1.0"
entrypoint = "entry.metta"
catalog = "catalog.metta"
signatures = "signatures.metta"
optional = true
default_enabled = true

provides = [
  "app:glucose",
  "sense:glucose",
  "skill:glucose-app-status",
  "skill:observe-glucose",
  "skill:glucose-history",
  "skill:set-glucose-watch",
  "skill:glucose-watch-status",
  "skill:clear-glucose-watch",
  "skill:glucose-rings",
]

requires = [
  "python>=3.10",
]

[trace]
writes = [
  "GlucoseObserved",
  "GlucoseWatchSet",
  "GlucoseRing",
  "GlucoseHistoryObserved",
]
