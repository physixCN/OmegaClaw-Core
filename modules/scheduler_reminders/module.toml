id = "omegaclaw.time.scheduler-reminders"
kind = "time-organ"
version = "0.1.0"
entrypoint = "entry.metta"
catalog = "catalog.metta"
signatures = "signatures.metta"
optional = true
default_enabled = true

provides = [
  "space:reminders",
  "runtime-organ:scheduler-reminders",
  "skill:reminder-add",
  "skill:reminder-list",
  "skill:reminder-cancel",
  "skill:reminder-due",
]

requires = [
  "python>=3.10",
]

[trace]
writes = [
  "ReminderAdded",
  "ReminderCancelled",
  "ReminderDueObserved",
]
