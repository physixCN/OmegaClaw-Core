id = "omegaclaw.skill.publishing"
kind = "skill-pack"
version = "0.1.0"
entrypoint = "entry.metta"
catalog = "catalog.metta"
signatures = "signatures.metta"
optional = true
default_enabled = true

provides = [
  "skill:write-web-page",
  "skill:list-web-pages",
  "skill:public-web-url",
  "skill:webhost-status",
  "skill:artifact-id",
  "skill:publish-artifact",
  "skill:unpublish-artifact",
  "skill:list-published-artifacts",
]

requires = [
  "python>=3.10",
]

[trace]
writes = [
  "WebPageWritten",
  "ArtifactPublished",
  "ArtifactUnpublished",
]
